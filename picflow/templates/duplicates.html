<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>PicFlow Duplicate Review</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body class="review-page">
    <main class="review-shell">
      <aside class="sidebar">
        <a class="back-link" href="/">← Панель</a>
        <h1>Ревью дублей</h1>
        <label class="field">
          <span>Фильтр</span>
          <select id="filterSelect">
            <option value="needs-review">Нуждаются в проверке</option>
            <option value="duplicates">Помечены как дубли</option>
            <option value="blocked">Блокировки/цензура</option>
            <option value="distinct">Не дубли</option>
            <option value="all">Все пары</option>
          </select>
        </label>
        <div class="shortcut-list">
          <div><kbd>D</kbd> Дубликат</div>
          <div><kbd>N</kbd> Не дубликат</div>
          <div><kbd>B</kbd> Блокировка</div>
          <div><kbd>C</kbd> Сброс ручной метки</div>
          <div><kbd>←</kbd> Назад</div>
          <div><kbd>→</kbd> Вперед</div>
        </div>
        <div id="pairList" class="pair-list"></div>
      </aside>

      <section class="workspace">
        <header class="workspace-head">
          <div>
            <p class="eyebrow">Пара</p>
            <h2 id="pairTitle">Загрузка…</h2>
          </div>
          <div class="toolbar">
            <button id="prevBtn">← Назад</button>
            <button id="nextBtn">Вперед →</button>
          </div>
        </header>

        <section class="viewer">
          <article class="image-card">
            <img id="leftImage" alt="left">
            <div class="image-meta" id="leftMeta"></div>
          </article>
          <article class="image-card">
            <img id="rightImage" alt="right">
            <div class="image-meta" id="rightMeta"></div>
          </article>
        </section>

        <section class="panel detail-panel">
          <div class="decision-row">
            <button class="primary" data-label="duplicate">D: Дубликат</button>
            <button data-label="distinct">N: Не дубликат</button>
            <button data-label="blocked">B: Блокировка</button>
            <button data-label="clear">C: Сбросить ручную метку</button>
          </div>
          <div id="metricsBox" class="metrics"></div>
          <pre id="reasonBox" class="log-box">AI-ответ появится здесь.</pre>
        </section>
      </section>
    </main>
    <script src="/static/duplicates.js"></script>
  </body>
  </html>
